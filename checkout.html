<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа | Инженерные системы Томск</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <style>
    .checkout-container {
      max-width: 1000px;
      margin: 60px auto;
      padding: 40px;
      background: var(--bg-card);
      border-radius: 32px;
      border: 1px solid rgba(0, 194, 255, 0.3);
    }
    .checkout-container h1 {
      color: var(--primary);
      margin-bottom: 32px;
      text-align: center;
    }
    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
    }
    @media (max-width: 768px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
    }
    .service-summary {
      background: rgba(0, 194, 255, 0.05);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(0, 194, 255, 0.2);
    }
    .service-summary h3 {
      color: var(--primary);
      margin-bottom: 20px;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .summary-total {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px solid rgba(0, 194, 255, 0.3);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      background: #0a0d16;
      border: 1px solid #2a2f3c;
      border-radius: 24px;
      color: white;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .contract-checkbox {
      margin: 24px 0;
    }
    .contract-checkbox label {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
    }
    .contract-checkbox input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--primary);
    }
    .contract-checkbox span {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .contract-checkbox a {
      color: var(--primary);
      text-decoration: none;
    }
    .contract-checkbox a:hover {
      text-decoration: underline;
    }
    .btn-pay, .btn-cart {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      margin-top: 16px;
    }
    .btn-cart {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    .btn-cart:hover {
      background: rgba(0, 194, 255, 0.1);
    }
    .button-group {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }
    .button-group .btn {
      flex: 1;
      margin-top: 0;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 24px;
      transition: var(--transition);
    }
    .back-link:hover {
      color: var(--primary);
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toast {
      min-width: 280px;
      max-width: 380px;
      background: rgba(12, 15, 23, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 16px 20px;
      border-left: 4px solid var(--primary);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(400px);
      opacity: 0;
      animation: toastSlideIn 0.3s ease forwards;
    }
    .toast-success { border-left-color: #00ffaa; }
    .toast-error { border-left-color: #ff5555; }
    .toast-warning { border-left-color: #ffaa00; }
    .toast-info { border-left-color: var(--primary); }
    .toast-icon i { font-size: 1.2rem; }
    .toast-success .toast-icon i { color: #00ffaa; }
    .toast-error .toast-icon i { color: #ff5555; }
    .toast-warning .toast-icon i { color: #ffaa00; }
    .toast-info .toast-icon i { color: var(--primary); }
    .toast-content { flex: 1; }
    .toast-message { font-size: 0.85rem; color: var(--text-muted); }
    .toast-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; padding: 4px; }
    @keyframes toastSlideIn {
      0% { transform: translateX(400px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    .toast-hide { animation: toastSlideOut 0.3s ease forwards; }
    @keyframes toastSlideOut {
      0% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(400px); opacity: 0; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="./" class="logo">
        <i class="fas fa-microchip"></i>
        <span>Инженерные системы</span>
      </a>
    </div>
  </nav>

  <div class="checkout-container">
    <h1><i class="fas fa-file-signature"></i> Оформление заказа</h1>
    
    <div class="checkout-grid">
      <div class="service-summary">
        <h3><i class="fas fa-clipboard-list"></i> Ваш заказ</h3>
        <div class="summary-item">
          <span>Услуга:</span>
          <strong id="serviceName">—</strong>
        </div>
        <div class="summary-item">
          <span>Площадь объекта:</span>
          <strong id="areaValue">—</strong>
        </div>
        <div class="summary-item">
          <span>Сложность монтажа:</span>
          <strong id="complexityValue">—</strong>
        </div>
        <div class="summary-item">
          <span>Дополнительные услуги:</span>
          <strong id="extrasValue">—</strong>
        </div>
        <div class="summary-total">
          <span>Итого к оплате:</span>
          <strong id="totalAmount">0 ₽</strong>
        </div>
        <div style="margin-top: 24px; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 16px;">
          <i class="fas fa-info-circle"></i> Тестовые карты:
          <ul style="margin-top: 8px; margin-left: 20px; color: var(--text-muted);">
            <li><strong>5555 5555 5555 4477</strong> — успешная оплата</li>
            <li><strong>5555 5555 5555 4444</strong> — оплата с 3D-Secure</li>
          </ul>
        </div>
      </div>

      <div>
        <form id="checkoutForm">
          <div class="form-group">
            <label><i class="fas fa-user"></i> Ваше имя *</label>
            <input type="text" id="fullName" placeholder="Иванов Иван Иванович" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-phone"></i> Телефон *</label>
            <input type="tel" id="phone" placeholder="+7 909 123 45 67" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email *</label>
            <input type="email" id="email" placeholder="ivan@example.com" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> Адрес объекта</label>
            <input type="text" id="address" placeholder="г. Томск, ул. Сибирская, 15">
          </div>
          <div class="form-group">
            <label><i class="fas fa-comment"></i> Комментарий (необязательно)</label>
            <textarea rows="3" id="comment" placeholder="Дополнительные пожелания..."></textarea>
          </div>

          <div class="contract-checkbox">
            <label>
              <input type="checkbox" id="contractAgree" required>
              <span>
                Я ознакомлен(а) и согласен(на) с 
                <a href="docs/client-agreement.html" target="_blank">договором оферты</a>, 
                <a href="docs/privacy-policy.html" target="_blank">политикой конфиденциальности</a> 
                и <a href="docs/personal-data-processing.html" target="_blank">согласием на обработку персональных данных</a>
              </span>
            </label>
          </div>

          <div class="button-group">
            <button type="button" class="btn btn-primary btn-pay" id="payBtn">
              <i class="fas fa-credit-card"></i> Перейти к оплате
            </button>
            <button type="button" class="btn btn-cart" id="cartBtn">
              <i class="fas fa-shopping-cart"></i> Добавить в корзину
            </button>
          </div>
        </form>
        
        <a href="./" class="back-link">
          <i class="fas fa-arrow-left"></i> Вернуться на главную
        </a>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const serviceType = urlParams.get('service') || 'water';
    const area = urlParams.get('area') || '150';
    const complexity = urlParams.get('complexity') || 'standard';
    const hasVisit = urlParams.get('visit') === 'true';
    const hasProject = urlParams.get('project') === 'true';
    const hasUrgent = urlParams.get('urgent') === 'true';
    const totalPrice = urlParams.get('total') || '0';
    
    const serviceNames = { water: 'Водоснабжение', heating: 'Отопление', fire: 'Пожарная безопасность', complex: 'Комплексный монтаж' };
    const complexityNames = { standard: 'Стандартный', medium: 'Повышенной сложности', premium: 'Премиум' };
    
    document.getElementById('serviceName').textContent = serviceNames[serviceType] || serviceType;
    document.getElementById('areaValue').textContent = area + ' м²';
    document.getElementById('complexityValue').textContent = complexityNames[complexity] || complexity;
    
    let extras = [];
    if (hasVisit) extras.push('Выезд специалиста');
    if (hasProject) extras.push('Проектирование');
    if (hasUrgent) extras.push('Срочный монтаж');
    document.getElementById('extrasValue').textContent = extras.length ? extras.join(', ') : '—';
    document.getElementById('totalAmount').textContent = parseInt(totalPrice).toLocaleString() + ' ₽';
    
    const SUPABASE_URL = 'https://dtuipgbsupodwvxlwmse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dWlwZ2JzdXBvZHd2eGx3bXNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzUxNzIsImV4cCI6MjA4OTkxMTE3Mn0.ABaA7-D4jU_64bFGQQZc3J4-0TUH5Lz8PjhqobK8ZvI';
    
    function showToast(message, type = 'success') {
      let container = document.getElementById('toastContainer');
      if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        container.id = 'toastContainer';
        document.body.appendChild(container);
      }
      
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <div class="toast-icon"><i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-exclamation-circle'}"></i></div>
        <div class="toast-content"><div class="toast-message">${message}</div></div>
        <button class="toast-close"><i class="fas fa-times"></i></button>
      `;
      container.appendChild(toast);
      
      const closeBtn = toast.querySelector('.toast-close');
      closeBtn.addEventListener('click', () => {
        toast.classList.add('toast-hide');
        setTimeout(() => toast.remove(), 300);
      });
      
      setTimeout(() => {
        if (toast.parentNode) {
          toast.classList.add('toast-hide');
          setTimeout(() => toast.remove(), 300);
        }
      }, 4000);
    }
    
    async function createContract(status, redirectToPayment = false) {
      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const contractAgree = document.getElementById('contractAgree').checked;
      
      if (!fullName || !phone || !email) {
        showToast('Пожалуйста, заполните все обязательные поля', 'warning');
        return false;
      }
      
      if (!contractAgree) {
        showToast('Пожалуйста, ознакомьтесь и согласитесь с условиями договора', 'warning');
        return false;
      }
      
      const btn = redirectToPayment ? document.getElementById('payBtn') : document.getElementById('cartBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Создание договора...';
      
      try {
        let session = await window.supabaseCheckAuth();
        let userId = null;
        
        if (!session) {
          const tempPassword = Math.random().toString(36).slice(-8);
          const signUpData = await window.supabaseSignUp(email, tempPassword, {
            full_name: fullName,
            phone: phone
          });
          if (signUpData.user) {
            await window.supabaseSignIn(email, tempPassword);
            session = await window.supabaseCheckAuth();
            userId = signUpData.user.id;
            showToast('Аккаунт создан!', 'success');
          } else {
            throw new Error('Не удалось создать аккаунт');
          }
        } else {
          const user = await window.supabaseGetCurrentUser();
          userId = user.id;
        }
        
        const contractNumber = 'ДГ-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + Math.floor(Math.random() * 10000);
        const serviceText = `${serviceNames[serviceType]} (площадь ${area} м², ${complexityNames[complexity]})${extras.length ? ', доп: ' + extras.join(', ') : ''}`;
        
        const contractResponse = await fetch(`${SUPABASE_URL}/rest/v1/contracts`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({
            user_id: userId,
            contract_number: contractNumber,
            contract_date: new Date().toISOString().slice(0,10),
            object_address: address,
            services: serviceText,
            total_amount: parseInt(totalPrice),
            status: status
          })
        });
        
        if (!contractResponse.ok) throw new Error('Не удалось создать договор');
        
        const contract = await contractResponse.json();
        
        if (redirectToPayment) {
          window.location.href = `payment-confirm.html?contract_id=${contract[0].id}`;
        } else {
          showToast('✅ Заказ добавлен в корзину! Перейдите в личный кабинет для оплаты.', 'success');
          setTimeout(() => {
            window.location.href = 'cabinet/dashboard.html';
          }, 2000);
        }
        
        return true;
      } catch (error) {
        console.error('Ошибка:', error);
        showToast(error.message || 'Ошибка при создании заказа', 'error');
        btn.disabled = false;
        btn.innerHTML = redirectToPayment ? '<i class="fas fa-credit-card"></i> Перейти к оплате' : '<i class="fas fa-shopping-cart"></i> Добавить в корзину';
        return false;
      }
    }
    
    document.getElementById('payBtn').addEventListener('click', () => {
      createContract('pending_payment', true);
    });
    
    document.getElementById('cartBtn').addEventListener('click', () => {
      createContract('pending_payment', false);
    });
  </script>
</body>
</html>
