<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои договоры | Инженерные системы Томск</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="../" class="logo">
        <i class="fas fa-microchip"></i>
        <span>Инженерные системы</span>
      </a>
      <div class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>

  <div class="cabinet-container">
    <div class="cabinet-header">
      <div class="cabinet-title">
        <h1>Мои договоры</h1>
        <p>Все договоры на оказание услуг</p>
      </div>
      <div class="cabinet-actions">
        <a href="../" class="back-home-btn">
          <i class="fas fa-arrow-left"></i> На главную
        </a>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Выйти
        </button>
      </div>
    </div>

    <div class="cabinet-nav">
      <a href="dashboard.html" class="cabinet-nav-link">Главная</a>
      <a href="contracts.html" class="cabinet-nav-link active">Мои договоры</a>
      <a href="payments.html" class="cabinet-nav-link">История оплат</a>
      <a href="profile.html" class="cabinet-nav-link">Настройки профиля</a>
    </div>

    <div class="table-container">
      <table class="data-table" id="contractsTable">
        <thead>
          <tr><th>№ договора</th><th>Дата</th><th>Объект</th><th>Услуги</th><th>Сумма</th><th>Статус</th> </thead>
        <tbody>
          <tr><td colspan="6" style="text-align: center;">Загрузка...</td> </tbody>
        </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    const SUPABASE_URL = 'https://dtuipgbsupodwvxlwmse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dWlwZ2JzdXBvZHd2eGx3bXNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzUxNzIsImV4cCI6MjA4OTkxMTE3Mn0.ABaA7-D4jU_64bFGQQZc3J4-0TUH5Lz8PjhqobK8ZvI';
    
    function getStatusText(status) {
      const statusMap = {
        'draft': 'Черновик',
        'signed': 'Подписан',
        'pending_payment': 'Ожидает оплаты',
        'in_progress': 'В работе',
        'completed': 'Выполнен',
        'cancelled': 'Отменён'
      };
      return statusMap[status] || status;
    }
    
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const session = await window.supabaseCheckAuth();
        if (!session) {
          window.location.href = 'login.html';
          return;
        }
        
        const user = await window.supabaseGetCurrentUser();
        if (!user) {
          window.location.href = 'login.html';
          return;
        }
        
        const contracts = await window.supabaseGetUserContracts(user.id);
        const tableBody = document.getElementById('contractsTable').querySelector('tbody');
        tableBody.innerHTML = '';
        
        if (contracts.length === 0) {
          tableBody.innerHTML = '}<td colspan="6" style="text-align: center;">У вас пока нет договоров</td></tr>';
        } else {
          contracts.forEach(contract => {
            const row = tableBody.insertRow();
            
            const numberCell = row.insertCell(0);
            if (contract.status === 'signed' && contract.pdf_url) {
              numberCell.innerHTML = `<a href="${contract.pdf_url}" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 600;">${contract.contract_number}</a>`;
            } else {
              numberCell.innerHTML = `<span style="color: var(--text-muted);">${contract.contract_number}</span>`;
            }
            
            row.insertCell(1).textContent = new Date(contract.contract_date).toLocaleDateString('ru-RU');
            row.insertCell(2).textContent = contract.object_address || '—';
            row.insertCell(3).textContent = contract.services || '—';
            row.insertCell(4).innerHTML = `<strong>${contract.total_amount.toLocaleString()} ₽</strong>`;
            row.insertCell(5).innerHTML = `<span class="status-badge status-${contract.status}">${getStatusText(contract.status)}</span>`;
          });
        }
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            await window.supabaseLogout();
          });
        }
        
      } catch (error) {
        console.error('Ошибка:', error);
        window.location.href = 'login.html';
      }
    });
  </script>
</body>
</html>
