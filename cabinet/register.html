<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация | Инженерные системы Томск</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="../" class="logo">
        <i class="fas fa-microchip"></i>
        <span>Инженерные системы</span>
      </a>
      <div class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2><i class="fas fa-user-plus"></i> Регистрация</h2>
      <div id="registerError" class="auth-error" style="display: none;"></div>
      <div id="registerSuccess" class="auth-success" style="display: none;"></div>
      <form id="registerForm">
        <div class="form-group">
          <input type="text" id="fullName" placeholder="Ваше имя" required>
        </div>
        <div class="form-group">
          <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="tel" id="phone" placeholder="Телефон">
        </div>
        <div class="form-group">
          <input type="password" id="password" placeholder="Пароль" required>
        </div>
        <div class="form-group">
          <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" required>
        </div>
        <button type="submit" class="btn btn-primary full-width" id="registerBtn">
          <i class="fas fa-user-check"></i> Зарегистрироваться
        </button>
      </form>
      <div class="auth-link">
        Уже есть аккаунт? <a href="login.html">Войти</a>
      </div>
      <div class="auth-link">
        <a href="../">← Вернуться на главную</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        if (typeof window.supabaseCheckAuth === 'function') {
          const session = await window.supabaseCheckAuth();
          if (session) {
            window.location.href = 'dashboard.html';
            return;
          }
        }
      } catch (e) {
        console.log('Ожидание инициализации...', e);
      }

      const registerForm = document.getElementById('registerForm');
      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');
      const registerBtn = document.getElementById('registerBtn');

      if (!registerForm) return;

      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (!fullName || !email || !password) {
          errorDiv.textContent = 'Пожалуйста, заполните все обязательные поля';
          errorDiv.style.display = 'block';
          return;
        }
        
        if (password !== confirmPassword) {
          errorDiv.textContent = 'Пароли не совпадают';
          errorDiv.style.display = 'block';
          return;
        }
        
        if (password.length < 6) {
          errorDiv.textContent = 'Пароль должен содержать не менее 6 символов';
          errorDiv.style.display = 'block';
          return;
        }
        
        if (typeof window.supabaseSignUp !== 'function') {
          errorDiv.textContent = 'Система регистрации загружается. Подождите 2 секунды и попробуйте снова.';
          errorDiv.style.display = 'block';
          return;
        }
        
        registerBtn.disabled = true;
        registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Регистрация...';
        
        try {
          const signUpData = await window.supabaseSignUp(email, password, {
            full_name: fullName,
            phone: phone
          });
          
          if (signUpData.user) {
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            try {
              const signInData = await window.supabaseSignIn(email, password);
              if (signInData.session) {
                try {
                  if (typeof window.supabaseUpsertUserProfile === 'function') {
                    await window.supabaseUpsertUserProfile(signInData.user.id, {
                      full_name: fullName,
                      phone: phone
                    });
                  }
                } catch (e) {
                  console.log('Профиль уже создан:', e);
                }
                window.location.href = 'dashboard.html';
                return;
              }
            } catch (loginError) {
              console.log('Авто-вход не удался:', loginError);
            }
            
            successDiv.innerHTML = '✅ Регистрация прошла успешно! Перенаправляем на вход...';
            successDiv.style.display = 'block';
            setTimeout(() => {
              window.location.href = 'login.html?registered=true';
            }, 2000);
          }
        } catch (error) {
          console.error('Ошибка:', error);
          let errorMessage = error.message || 'Ошибка регистрации';
          if (errorMessage.includes('User already registered')) {
            errorMessage = 'Пользователь с таким email уже зарегистрирован';
          }
          errorDiv.textContent = errorMessage;
          errorDiv.style.display = 'block';
          registerBtn.disabled = false;
          registerBtn.innerHTML = '<i class="fas fa-user-check"></i> Зарегистрироваться';
        }
      });
    });
  </script>
</body>
</html>
