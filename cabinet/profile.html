<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки профиля | Инженерные системы Томск</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="../" class="logo">
        <i class="fas fa-microchip"></i>
        <span>Инженерные системы</span>
      </a>
      <div class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>

  <div class="cabinet-container">
    <div class="cabinet-header">
      <div class="cabinet-title">
        <h1>Настройки профиля</h1>
        <p>Управление личными данными</p>
      </div>
      <div class="cabinet-actions">
        <a href="../" class="back-home-btn">
          <i class="fas fa-arrow-left"></i> На главную
        </a>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Выйти
        </button>
      </div>
    </div>

    <div class="cabinet-nav">
      <a href="dashboard.html" class="cabinet-nav-link">Главная</a>
      <a href="contracts.html" class="cabinet-nav-link">Мои договоры</a>
      <a href="payments.html" class="cabinet-nav-link">История оплат</a>
      <a href="profile.html" class="cabinet-nav-link active">Настройки профиля</a>
    </div>

    <div class="profile-form">
      <form id="profileForm">
        <div class="form-group">
          <label style="color: var(--primary);">Email</label>
          <input type="email" id="email" disabled style="opacity: 0.7;">
        </div>
        <div class="form-group">
          <label style="color: var(--primary);">ФИО</label>
          <input type="text" id="fullName" placeholder="Ваше полное имя">
        </div>
        <div class="form-group">
          <label style="color: var(--primary);">Телефон</label>
          <input type="tel" id="phone" placeholder="+7 XXX XXX-XX-XX">
        </div>
        <div class="form-group">
          <label style="color: var(--primary);">Адрес</label>
          <input type="text" id="address" placeholder="Город, улица, дом">
        </div>
        <button type="submit" class="btn btn-primary full-width">
          <i class="fas fa-save"></i> Сохранить изменения
        </button>
      </form>
      <div id="profileMessage" style="margin-top: 16px; text-align: center;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const session = await window.supabaseCheckAuth();
        if (!session) {
          window.location.href = 'login.html';
          return;
        }
        
        const user = await window.supabaseGetCurrentUser();
        if (!user) {
          window.location.href = 'login.html';
          return;
        }
        
        document.getElementById('email').value = user.email;
        
        const profile = await window.supabaseGetUserProfile(user.id);
        if (profile) {
          document.getElementById('fullName').value = profile.full_name || '';
          document.getElementById('phone').value = profile.phone || '';
          document.getElementById('address').value = profile.address || '';
        }
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            await window.supabaseLogout();
          });
        }
        
        const profileForm = document.getElementById('profileForm');
        const messageDiv = document.getElementById('profileMessage');
        
        profileForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const updates = {
            full_name: document.getElementById('fullName').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            updated_at: new Date().toISOString()
          };
          
          try {
            await window.supabaseUpdateUserProfile(user.id, updates);
            messageDiv.innerHTML = '<p style="color: #00ffaa;">✅ Профиль успешно обновлён!</p>';
            setTimeout(() => {
              messageDiv.innerHTML = '';
            }, 3000);
          } catch (error) {
            console.error('Ошибка:', error);
            messageDiv.innerHTML = '<p style="color: #ff5555;">❌ Ошибка при обновлении профиля</p>';
          }
        });
        
      } catch (error) {
        console.error('Ошибка:', error);
        window.location.href = 'login.html';
      }
    });
  </script>
</body>
</html>
