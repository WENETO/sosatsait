<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в личный кабинет | Инженерные системы Томск</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="../" class="logo">
        <i class="fas fa-microchip"></i>
        <span>Инженерные системы</span>
      </a>
      <div class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2><i class="fas fa-sign-in-alt"></i> Вход в кабинет</h2>
      <div id="loginError" class="auth-error" style="display: none;"></div>
      <div id="loginSuccess" class="auth-success" style="display: none;"></div>
      <form id="loginForm">
        <div class="form-group">
          <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="password" placeholder="Пароль" required>
        </div>
        <button type="submit" class="btn btn-primary full-width" id="loginBtn">
          <i class="fas fa-arrow-right-to-bracket"></i> Войти
        </button>
      </form>
      <div class="auth-link">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </div>
      <div class="auth-link">
        <a href="../">← Вернуться на главную</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('registered') === 'true') {
        const successDiv = document.getElementById('loginSuccess');
        successDiv.innerHTML = '✅ Регистрация прошла успешно! Теперь войдите в свой аккаунт.';
        successDiv.style.display = 'block';
      }
      
      try {
        if (typeof window.supabaseCheckAuth === 'function') {
          const session = await window.supabaseCheckAuth();
          if (session) {
            window.location.href = 'dashboard.html';
            return;
          }
        }
      } catch (e) {
        console.log('Ожидание инициализации...', e);
      }

      const loginForm = document.getElementById('loginForm');
      const errorDiv = document.getElementById('loginError');
      const loginBtn = document.getElementById('loginBtn');

      if (!loginForm) return;

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        errorDiv.style.display = 'none';
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
          errorDiv.textContent = 'Пожалуйста, заполните все поля';
          errorDiv.style.display = 'block';
          return;
        }
        
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';
        
        try {
          if (typeof window.supabaseSignIn !== 'function') {
            throw new Error('Функция входа не загружена. Обновите страницу.');
          }
          
          const data = await window.supabaseSignIn(email, password);
          
          if (data.session) {
            window.location.href = 'dashboard.html';
          } else {
            throw new Error('Не удалось создать сессию');
          }
        } catch (error) {
          console.error('Ошибка входа:', error);
          errorDiv.textContent = error.message || 'Ошибка входа. Проверьте email и пароль.';
          errorDiv.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Войти';
        }
      });
    });
  </script>
</body>
</html>
