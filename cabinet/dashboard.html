<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет | Инженерные системы Томск</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #0c0f17;
      border-radius: 32px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      border: 1px solid var(--primary);
    }
    .modal-content input, .modal-content textarea, .modal-content select {
      width: 100%;
      margin: 12px 0;
      padding: 12px;
      background: #05070c;
      border: 1px solid #2a2f3c;
      border-radius: 20px;
      color: white;
    }
    .modal-close {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="../" class="logo">
        <i class="fas fa-microchip"></i>
        <span>Инженерные системы</span>
      </a>
      <div class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>

  <div class="cabinet-container">
    <div class="cabinet-header">
      <div class="cabinet-title">
        <h1>Личный кабинет</h1>
        <p>Добро пожаловать, <span id="userName">Загрузка...</span></p>
      </div>
      <div class="cabinet-actions">
        <a href="../" class="back-home-btn">
          <i class="fas fa-arrow-left"></i> На главную
        </a>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Выйти
        </button>
      </div>
    </div>

    <div class="cabinet-nav">
      <a href="dashboard.html" class="cabinet-nav-link active">Главная</a>
      <a href="contracts.html" class="cabinet-nav-link">Мои договоры</a>
      <a href="payments.html" class="cabinet-nav-link">История оплат</a>
      <a href="profile.html" class="cabinet-nav-link">Настройки профиля</a>
    </div>

    <div class="cabinet-stats" id="dashboardStats">
      <div class="stat-card">
        <i class="fas fa-file-contract"></i>
        <div class="value" id="contractsCount">0</div>
        <div class="label">Договоров</div>
      </div>
      <div class="stat-card">
        <i class="fas fa-ruble-sign"></i>
        <div class="value" id="totalAmount">0</div>
        <div class="label">Общая сумма (₽)</div>
      </div>
      <div class="stat-card">
        <i class="fas fa-check-circle"></i>
        <div class="value" id="paidAmount">0</div>
        <div class="label">Оплачено (₽)</div>
      </div>
      <div class="stat-card">
        <i class="fas fa-clock"></i>
        <div class="value" id="pendingAmount">0</div>
        <div class="label">К оплате (₽)</div>
      </div>
    </div>

    <div class="table-container">
      <h3 style="margin-bottom: 20px; color: var(--primary);">Мои договоры</h3>
      <table class="data-table" id="contractsTable">
        <thead>
          <tr><th>№ договора</th><th>Дата</th><th>Объект</th><th>Сумма</th><th>Статус</th><th>Действие</th> </thead>
        <tbody>
          <td><td colspan="6" style="text-align: center;">Загрузка...</td> </tbody>
        </table>
    </div>
  </div>

  <!-- Модальное окно редактирования -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <h3>Редактирование заказа</h3>
      <form id="editForm">
        <input type="hidden" id="editContractId">
        <div class="form-group">
          <label>Адрес объекта</label>
          <input type="text" id="editAddress" placeholder="г. Томск, ул. Сибирская, 15">
        </div>
        <div class="form-group">
          <label>Состав работ</label>
          <textarea id="editServices" rows="3" placeholder="Описание работ"></textarea>
        </div>
        <div class="form-group">
          <label>Комментарий</label>
          <textarea id="editComment" rows="2" placeholder="Дополнительные пожелания..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary full-width">Сохранить изменения</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    const SUPABASE_URL = 'https://dtuipgbsupodwvxlwmse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dWlwZ2JzdXBvZHd2eGx3bXNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzUxNzIsImV4cCI6MjA4OTkxMTE3Mn0.ABaA7-D4jU_64bFGQQZc3J4-0TUH5Lz8PjhqobK8ZvI';
    
    let currentUser = null;
    
    function getStatusText(status) {
      const statusMap = {
        'draft': 'Черновик',
        'signed': 'Подписан',
        'pending_payment': 'Ожидает оплаты',
        'in_progress': 'В работе',
        'completed': 'Выполнен',
        'cancelled': 'Отменён'
      };
      return statusMap[status] || status;
    }
    
    async function updateContract(contractId, data) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/contracts?id=eq.${contractId}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify(data)
      });
      return response.ok;
    }
    
    async function loadDashboard() {
      // Получаем договоры
      const contracts = await window.supabaseGetUserContracts(currentUser.id);
      
      // Получаем платежи (успешные)
      const paymentsResponse = await fetch(`${SUPABASE_URL}/rest/v1/payments?user_id=eq.${currentUser.id}&status=eq.paid`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      const payments = await paymentsResponse.json();
      
      // Виджеты
      document.getElementById('contractsCount').textContent = contracts.length;
      
      let totalAmount = 0;
      contracts.forEach(c => { totalAmount += c.total_amount; });
      document.getElementById('totalAmount').textContent = totalAmount.toLocaleString();
      
      let paidAmount = 0;
      payments.forEach(p => { paidAmount += p.amount; });
      document.getElementById('paidAmount').textContent = paidAmount.toLocaleString();
      document.getElementById('pendingAmount').textContent = (totalAmount - paidAmount).toLocaleString();
      
      // Таблица договоров
      const tableBody = document.getElementById('contractsTable').querySelector('tbody');
      tableBody.innerHTML = '';
      
      if (contracts.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Нет договоров</td></tr>';
      } else {
        contracts.forEach(contract => {
          const row = tableBody.insertRow();
          
          const numberCell = row.insertCell(0);
          if (contract.status === 'signed' && contract.pdf_url) {
            numberCell.innerHTML = `<a href="${contract.pdf_url}" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 600;">${contract.contract_number}</a>`;
          } else {
            numberCell.innerHTML = `<span style="color: var(--text-muted);">${contract.contract_number}</span>`;
          }
          
          row.insertCell(1).textContent = new Date(contract.contract_date).toLocaleDateString('ru-RU');
          row.insertCell(2).textContent = contract.object_address || '—';
          row.insertCell(3).innerHTML = `<strong>${contract.total_amount.toLocaleString()} ₽</strong>`;
          row.insertCell(4).innerHTML = `<span class="status-badge status-${contract.status}">${getStatusText(contract.status)}</span>`;
          
          const actionCell = row.insertCell(5);
          if (contract.status === 'pending_payment') {
            actionCell.innerHTML = `
              <a href="../payment-confirm.html?contract_id=${contract.id}" class="btn btn-primary" style="padding: 4px 12px; font-size: 0.75rem; margin-right: 8px;">
                <i class="fas fa-credit-card"></i> Оплатить
              </a>
              <button class="btn btn-outline edit-btn" data-id="${contract.id}" data-address="${contract.object_address || ''}" data-services="${contract.services || ''}" data-comment="" style="padding: 4px 12px; font-size: 0.75rem;">
                <i class="fas fa-edit"></i> Редактировать
              </button>
            `;
          } else if (contract.status === 'signed' && contract.pdf_url) {
            actionCell.innerHTML = `<a href="${contract.pdf_url}" target="_blank" class="btn btn-outline" style="padding: 4px 12px; font-size: 0.75rem;"><i class="fas fa-download"></i> Скачать</a>`;
          } else {
            actionCell.innerHTML = '<span style="color: var(--text-muted);">—</span>';
          }
        });
        
        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.getElementById('editContractId').value = btn.dataset.id;
            document.getElementById('editAddress').value = btn.dataset.address;
            document.getElementById('editServices').value = btn.dataset.services;
            document.getElementById('editComment').value = btn.dataset.comment || '';
            document.getElementById('editModal').style.display = 'flex';
          });
        });
      }
    }
    
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const session = await window.supabaseCheckAuth();
        if (!session) {
          window.location.href = 'login.html';
          return;
        }
        
        currentUser = await window.supabaseGetCurrentUser();
        if (!currentUser) {
          window.location.href = 'login.html';
          return;
        }
        
        const profile = await window.supabaseGetUserProfile(currentUser.id);
        document.getElementById('userName').textContent = profile?.full_name || currentUser.email;
        
        await loadDashboard();
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            await window.supabaseLogout();
          });
        }
        
        const modal = document.getElementById('editModal');
        const closeSpan = document.querySelector('.modal-close');
        closeSpan.addEventListener('click', () => {
          modal.style.display = 'none';
        });
        window.addEventListener('click', (e) => {
          if (e.target === modal) modal.style.display = 'none';
        });
        
        const editForm = document.getElementById('editForm');
        editForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const contractId = document.getElementById('editContractId').value;
          const address = document.getElementById('editAddress').value;
          const services = document.getElementById('editServices').value;
          
          const success = await updateContract(contractId, {
            object_address: address,
            services: services
          });
          
          if (success) {
            alert('✅ Заказ успешно обновлён!');
            modal.style.display = 'none';
            await loadDashboard();
          } else {
            alert('❌ Ошибка при обновлении заказа');
          }
        });
        
      } catch (error) {
        console.error('Ошибка загрузки кабинета:', error);
        window.location.href = 'login.html';
      }
    });
  </script>
</body>
</html>
